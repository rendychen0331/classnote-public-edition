name: Build APK

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
          python3 -c "import json; d=json.load(open('app/google-services.json')); [print('cert_hash:', c) for client in d['client'] for c in client['client_info']['android_client_info'].get('certificate_hash',[])]"

      - name: Decode msal_config.json
        run: |
          mkdir -p app/src/main/res/raw
          echo "${{ secrets.MSAL_CONFIG_JSON }}" | base64 -d > app/src/main/res/raw/msal_config.json

      - name: Decode msal_auth_config.xml
        run: echo "${{ secrets.MSAL_AUTH_CONFIG_XML }}" | base64 -d > app/src/main/res/values/msal_auth_config.xml

      - name: Decode debug keystore
        run: |
          mkdir -p $HOME/.android
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > $HOME/.android/debug.keystore
          echo "Keystore size: $(wc -c < $HOME/.android/debug.keystore) bytes"
          keytool -list -v -keystore $HOME/.android/debug.keystore -storepass android -alias androiddebugkey 2>&1 | grep -E "SHA1|SHA-1" || true

      - name: Build base APK + feature .dex files
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            :feature-google:bundleFeatureDex \
            :feature-microsoft:bundleFeatureDex \
            :feature-ai:bundleFeatureDex \
            :feature-weather:bundleFeatureDex \
            --no-daemon --no-build-cache --no-configuration-cache

      - name: Show APK signing certificate SHA-1
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner verify --print-certs "$APK" | grep -E "SHA-1|SHA1"

      - name: Rename APK and collect artifacts
        run: |
          TAG=${GITHUB_REF_NAME:-build-${{ github.run_number }}}
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/classnote-${TAG}.apk

          # Collect feature .dex files
          mkdir -p dist
          cp app/build/outputs/apk/debug/classnote-${TAG}.apk dist/
          cp feature-google/build/outputs/feature-dex/feature-google.dex dist/ || echo "feature-google.dex not found"
          cp feature-microsoft/build/outputs/feature-dex/feature-microsoft.dex dist/ || echo "feature-microsoft.dex not found"
          cp feature-ai/build/outputs/feature-dex/feature-ai.dex dist/ || echo "feature-ai.dex not found"
          cp feature-weather/build/outputs/feature-dex/feature-weather.dex dist/ || echo "feature-weather.dex not found"

      - name: Generate features.json manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF_NAME}
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build/outputs/apk/debug/output-metadata.json 2>/dev/null || echo "0")

          sha256_of() { sha256sum "$1" | awk '{print $1}'; }
          size_of() { stat -c%s "$1"; }

          GOOGLE_DEX="dist/feature-google.dex"
          MS_DEX="dist/feature-microsoft.dex"
          AI_DEX="dist/feature-ai.dex"
          WEATHER_DEX="dist/feature-weather.dex"

          FEATURES="[]"
          if [ -f "$GOOGLE_DEX" ]; then
            FEATURES=$(echo "$FEATURES" | python3 -c "
          import sys, json
          features = json.load(sys.stdin)
          features.append({
            'id': 'google',
            'displayName': 'Google 同步功能',
            'description': 'Gmail、Google Classroom、Google 日曆、Tasks、Keep 同步與 Drive 備份',
            'downloadUrl': '$BASE_URL/feature-google.dex',
            'sha256': '$(sha256_of $GOOGLE_DEX)',
            'sizeBytes': $(size_of $GOOGLE_DEX),
            'minAppVersion': 0
          })
          print(json.dumps(features))
          ")
          fi

          if [ -f "$MS_DEX" ]; then
            FEATURES=$(echo "$FEATURES" | python3 -c "
          import sys, json
          features = json.load(sys.stdin)
          features.append({
            'id': 'microsoft',
            'displayName': 'Microsoft 同步功能',
            'description': 'Microsoft To Do、Outlook 行事曆、OneNote、Teams 作業、OneDrive 備份',
            'downloadUrl': '$BASE_URL/feature-microsoft.dex',
            'sha256': '$(sha256_of $MS_DEX)',
            'sizeBytes': $(size_of $MS_DEX),
            'minAppVersion': 0
          })
          print(json.dumps(features))
          ")
          fi

          if [ -f "$AI_DEX" ]; then
            FEATURES=$(echo "$FEATURES" | python3 -c "
          import sys, json
          features = json.load(sys.stdin)
          features.append({
            'id': 'ai',
            'displayName': 'AI 智能功能',
            'description': '通知辨識、課堂摘要、AI 對話（支援 Gemini、Claude、OpenAI、Groq、DeepSeek、Mimo）',
            'downloadUrl': '$BASE_URL/feature-ai.dex',
            'sha256': '$(sha256_of $AI_DEX)',
            'sizeBytes': $(size_of $AI_DEX),
            'minAppVersion': 0
          })
          print(json.dumps(features))
          ")
          fi

          if [ -f "$WEATHER_DEX" ]; then
            FEATURES=$(echo "$FEATURES" | python3 -c "
          import sys, json
          features = json.load(sys.stdin)
          features.append({
            'id': 'weather',
            'displayName': '天氣功能',
            'description': '中央氣象署 36 小時天氣預報，支援全台 22 縣市及各鄉鎮，每日天氣推播',
            'downloadUrl': '$BASE_URL/feature-weather.dex',
            'sha256': '$(sha256_of $WEATHER_DEX)',
            'sizeBytes': $(size_of $WEATHER_DEX),
            'minAppVersion': 0
          })
          print(json.dumps(features))
          ")
          fi

          echo "{\"version\":1,\"features\":$FEATURES}" | python3 -m json.tool > dist/features.json
          cat dist/features.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: classnote-${{ github.run_number }}
          path: |
            dist/classnote-*.apk
            dist/feature-*.dex
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/classnote-*.apk
            dist/feature-google.dex
            dist/feature-microsoft.dex
            dist/feature-ai.dex
            dist/feature-weather.dex
            dist/features.json
          generate_release_notes: true
